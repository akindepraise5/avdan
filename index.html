        }

            height: 4px;
            background: #e2e8f0;
            border-radius: 5px;

            background: #000;
            cursor: pointer;

                                    <Icon name="Plus" className="w-4 h-4 group-open:rotate-45 transition-transform" />

                                <div className="p-6 pt-0 text-sm text-slate-500 italic leading-relaxed border-t border-slate-50">{faq.a}</div>
                            </details>

                    </div>
                </div>

        function ContactView() {

                        <h4 className="text-5xl font-light italic mb-10 leading-tight">We Love to <br /><span className="font-black underline decoration-rose-500/20 underline-offset-8">Hear From You</span></h4>
                        <div className="space-y-12">
                            <div className="flex items-start gap-8">
                                <div className="w-14 h-14 bg-black text-white flex items-center justify-center shrink-0 shadow-lg"><Icon name="MapPin" className="w-7 h-7" /></div>

                                <div className="w-14 h-14 bg-black text-white flex items-center justify-center shrink-0 shadow-lg"><Icon name="MessageSquare" className="w-7 h-7" /></div>
                                <div><h5 className="text-[11px] font-black uppercase tracking-widest mb-3">Customer Care</h5><p className="text-sm text-slate-500 italic leading-relaxed">support@advan.com<br />+1 (212) 555-0198</p></div>
                            </div>
                        </div>

                            </div>
                            <textarea placeholder="HOW CAN WE HELP?" className="w-full bg-white p-5 h-48 text-[10px] font-black border border-slate-100 focus:outline-none resize-none"></textarea>
                            <button className="w-full bg-black text-white py-6 text-[11px] font-black uppercase tracking-[0.3em] hover:bg-rose-600 transition-all shadow-xl">Send Inquiry</button>
                        </form>
                    </div>
                </div>
            );

                        <div className="flex items-center gap-6">
                            {[1, 2, 3].map(step => (
                                <div key={step} className="flex items-center gap-4">
                                    <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-xs transition-all ${checkoutStep >= step ? 'bg-black text-white' : 'bg-slate-50 text-slate-300'}`}>{step}</div>
                                    {step < 3 && <div className={`w-16 h-[2px] ${checkoutStep > step ? 'bg-black' : 'bg-slate-100'}`} />}
                                </div>
                            ))}
                        </div>
                        {checkoutStep === 1 && (
                            <div className="space-y-8">

                                        <input type="text" placeholder="MM/YY" className="bg-white p-5 text-[10px] font-black focus:outline-none border border-slate-200" />

                                    </div>
                                </div>
                                <button onClick={() => setCheckoutStep(3)} className="w-full bg-black text-white py-6 text-[11px] font-black uppercase tracking-[0.3em] hover:bg-rose-600 shadow-xl">Complete Order Review</button>
                            </div>
                        )}
                        {checkoutStep === 3 && (
                            <div className="text-center py-20">
                                <div className="w-24 h-24 bg-rose-50 rounded-full flex items-center justify-center mx-auto mb-8"><Icon name="CheckCircle" className="w-12 h-12 text-rose-500" /></div>
                                <h4 className="text-5xl font-black italic mb-6">Confirmed!</h4>
                                <p className="text-slate-400 text-sm font-black uppercase tracking-widest mb-12 italic">Thank you for your purchase.</p>
                                <button onClick={() => { setView('home'); setCheckoutStep(1); setCart([]); }} className="px-16 py-6 bg-black text-white text-[10px] font-black uppercase tracking-[0.4em] hover:bg-rose-600 shadow-2xl transition-all">Return to Home</button>
                            </div>
                        )}
                    </div>
                    <div className="bg-stone-50 p-12 h-fit border border-stone-200 rounded-sm">
                        <h5 className="text-[11px] font-black uppercase tracking-[0.4em] mb-12 pb-4 border-b border-stone-200 italic">Order Review</h5>
                        <div className="space-y-8 mb-12">
                            {cart.map(item => (
                                <div key={item.id} className="flex justify-between items-center text-xs font-bold">
                                    <span>{item.name} ×{item.quantity}</span><span className="font-black">${(item.price * item.quantity).toFixed(2)}</span>

                    </div>
                </div>
            );
        }

        function Footer({ setView, setPolicyType }) {
            return (

                                <Icon name="Youtube" className="w-4 h-4 cursor-pointer hover:text-rose-500" />

                        <div>
                            <h5 className="text-[11px] font-black uppercase tracking-[0.3em] mb-8">Explore</h5>
                            <ul className="text-[12px] text-slate-500 space-y-4 font-bold uppercase tracking-tight">
                                <li onClick={() => setView('shop')} className="cursor-pointer hover:text-rose-500">All Products</li>
                                <li onClick={() => setView('faq')} className="cursor-pointer hover:text-rose-500">FAQs</li>
                                <li onClick={() => { setView('policy'); setPolicyType('privacy'); }} className="cursor-pointer hover:text-rose-500">Privacy Policy</li>
                                <li onClick={() => { setView('policy'); setPolicyType('terms'); }} className="cursor-pointer hover:text-rose-500">Terms & Conditions</li>
                            </ul>
                        </div>
                        <div>
                            <h5 className="text-[11px] font-black uppercase tracking-[0.3em] mb-8">Support</h5>
                            <ul className="text-[12px] text-slate-500 space-y-4 font-bold uppercase tracking-tight">
                                <li onClick={() => setView('contact')} className="cursor-pointer hover:text-rose-500">Contact Us</li>
                                <li onClick={() => { setView('policy'); setPolicyType('shipping'); }} className="cursor-pointer hover:text-rose-500">Shipping Policy</li>
                            </ul>
                        </div>
                        <div>
                            <h5 className="text-[11px] font-black uppercase tracking-[0.3em] mb-8">Newsletter</h5>
                            <div className="relative border-b border-black">
                                <input type="text" placeholder="Email Address" className="w-full bg-transparent py-2 text-[11px] font-black focus:outline-none" />
                                <button className="absolute right-0 bottom-2 text-[10px] font-black hover:text-rose-500">JOIN</button>
                            </div>
                        </div>
                    </div>
                    <div className="max-w-7xl mx-auto px-6 pt-10 border-t border-slate-100 text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">
                        <p>© 2024 Advan Studio. All Rights Reserved.</p>
                    </div>
                </footer>
            );
        }

        // --- RENDER ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
